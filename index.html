<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uniro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
border-left:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.sidebar button{
background:#1e293b;
border:none;
padding:16px;
border-radius:18px;
color:white;
cursor:pointer;
text-align:right;
font-size:15px;
transition:.3s;
}

.sidebar button:hover{
background:#2563eb;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow:auto;
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:28px;
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card h2{
margin-bottom:12px;
font-size:22px;
}

.card p{
opacity:.8;
line-height:1.8;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
overflow:hidden;
border-radius:20px;
}

th,td{
padding:16px;
background:#111827;
text-align:center;
}

th{
background:#1e293b;
}

/* CHAT */

.chat{
height:calc(100vh - 50px);
background:#111827;
border-radius:30px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-top{
padding:18px;
background:#1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
padding:14px 18px;
border-radius:20px;
max-width:75%;
line-height:1.7;
}

.me{
background:#2563eb;
align-self:flex-start;
}

.other{
background:#1e293b;
align-self:flex-end;
}

.chat-input{
padding:12px;
background:#0f172a;
display:flex;
gap:10px;
align-items:center;
}

.chat-input input{
flex:1;
padding:16px;
border:none;
border-radius:18px;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
}

.chat-input button{
background:#2563eb;
border:none;
padding:15px 20px;
border-radius:18px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

body{
flex-direction:column;
overflow:auto;
}

.sidebar{
width:100%;
flex-direction:row;
overflow:auto;
}

.logo{
display:none;
}

.main{
padding:15px;
}

.chat{
height:80vh;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Uniro
</div>

<button onclick="openPage('notifications')">
🔔 التنبيهات
</button>

<button onclick="openPage('schedule')">
📅 جدول المحاضرات
</button>

<button onclick="openPage('chat')">
💬 الشات
</button>

</div>

<!-- MAIN -->

<div class="main">

<div id="content">

<!-- NOTIFICATIONS -->

<div class="grid">

<div class="card">
<h2>🔔 مواعيد المحاضرات</h2>
<p>
تنبيه قبل بداية المحاضرات تلقائياً.
</p>
</div>

<div class="card">
<h2>📝 الاختبارات الذاتية</h2>
<p>
تذكير بالاختبارات والمراجعة.
</p>
</div>

<div class="card">
<h2>📚 الاختبارات الدورية</h2>
<p>
تنبيهات مواعيد الاختبارات القادمة.
</p>
</div>

<div class="card">
<h2>👥 المنتدى</h2>
<p>
آخر المشاركات والتنبيهات الجامعية.
</p>
</div>

<div class="card">
<h2>✅ الواجبات</h2>
<p>
متابعة الواجبات ومواعيد التسليم.
</p>
</div>

</div>

</div>

</div>

<script>

/* OPEN PAGES */

function openPage(page){

const content =
document.getElementById("content");

/* NOTIFICATIONS */

if(page === "notifications"){

content.innerHTML = `

<div class="grid">

<div class="card">
<h2>🔔 مواعيد المحاضرات</h2>
<p>تنبيه قبل المحاضرات تلقائياً.</p>
</div>

<div class="card">
<h2>📝 الاختبارات الذاتية</h2>
<p>متابعة الاختبارات والمراجعة.</p>
</div>

<div class="card">
<h2>📚 الاختبارات الدورية</h2>
<p>جدولة وتنبيهات مستمرة.</p>
</div>

<div class="card">
<h2>👥 المنتدى</h2>
<p>إشعارات المشاركات الجديدة.</p>
</div>

<div class="card">
<h2>✅ الواجبات</h2>
<p>تنبيهات التسليم والمهام.</p>
</div>

</div>

`;

}

/* SCHEDULE */

if(page === "schedule"){

content.innerHTML = `

<div class="card">

<h2>
📅 جدول المحاضرات
</h2>

<table>

<tr>
<th>المادة</th>
<th>الوقت</th>
<th>اليوم</th>
</tr>

<tr>
<td>أساسيات الاقتصاد</td>
<td>10:00 AM</td>
<td>الأحد</td>
</tr>

<tr>
<td>رياضيات الأعمال</td>
<td>1:00 PM</td>
<td>الإثنين</td>
</tr>

<tr>
<td>الإدارة المالية</td>
<td>11:00 AM</td>
<td>الثلاثاء</td>
</tr>

</table>

</div>

`;

}

/* CHAT */

if(page === "chat"){

content.innerHTML = `

<div class="chat">

<div class="chat-top">

<div>
💬 الشات الجامعي
</div>

<div>
🟢 متصل
</div>

</div>

<div class="chat-messages"
id="messages">

<div class="msg other">
أهلاً بك في شات Uniro 👋
</div>

<div class="msg me">
الشات مستقر وسريع 🔥
</div>

</div>

<div class="chat-input">

<input type="text"
id="msgInput"
placeholder="اكتب رسالتك..." />

<button onclick="sendMsg()">
إرسال
</button>

</div>

</div>

`;

}

}

/* SEND MESSAGE */

function sendMsg(){

let input =
document.getElementById("msgInput");

let text = input.value.trim();

if(text === "") return;

let messages =
document.getElementById("messages");

let div =
document.createElement("div");

div.className = "msg me";

div.innerText = text;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

input.value = "";

}

</script>

</body>

</html>
